services:
  mealicious-db:
    image: postgres:16-alpine
    container_name: mealicious-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealicious
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mealicious
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - mealicious-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealicious -d mealicious"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mealicious-net

  mealicious:
    build:
      context: .
      dockerfile: Dockerfile
    image: mealicious:latest
    container_name: mealicious
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://mealicious:${POSTGRES_PASSWORD}@mealicious-db:5432/mealicious?schema=public
    depends_on:
      mealicious-db:
        condition: service_healthy
    networks:
      - mealicious-net

volumes:
  mealicious-pgdata:

networks:
  mealicious-net:
    driver: bridge
